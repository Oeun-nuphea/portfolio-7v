name: Telegram Notify

on:
  push:
  pull_request:
  create:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram message
        run: |
          EVENT_NAME="${{ github.event_name }}"
          REPO="${{ github.repository }}"
          ACTOR="${{ github.actor }}"
          
          # Clean up branch name (removes refs/heads/)
          BRANCH=$(echo "${{ github.ref }}" | sed 's|refs/heads/||')

          if [ "$EVENT_NAME" = "push" ]; then
            COMMIT_MSG="${{ github.event.head_commit.message }}"
            MESSAGE="<b>📌 Push Event</b>%0A<b>Repo:</b> $REPO%0A<b>Actor:</b> $ACTOR%0A<b>Branch:</b> $BRANCH%0A<b>Commit:</b> $COMMIT_MSG"

          elif [ "$EVENT_NAME" = "pull_request" ]; then
            ACTION="${{ github.event.action }}"
            PR_TITLE="${{ github.event.pull_request.title }}"
            PR_NUM="${{ github.event.pull_request.number }}"
            MESSAGE="<b>🔀 PR $ACTION</b>%0A<b>Repo:</b> $REPO%0A<b>Actor:</b> $ACTOR%0A<b>PR:</b> #$PR_NUM - $PR_TITLE"

          elif [ "$EVENT_NAME" = "create" ]; then
            TYPE="${{ github.event.ref_type }}"
            NAME="${{ github.event.ref }}"
            MESSAGE="<b>🆕 New $TYPE</b>%0A<b>Repo:</b> $REPO%0A<b>Actor:</b> $ACTOR%0A<b>Name:</b> $NAME"
          fi

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="HTML" \
            -d text="$MESSAGE"